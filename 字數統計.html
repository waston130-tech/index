<!DOCTYPE html>
<html>
<head>
    <title>即時字數偵測</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #counter { position: fixed; top: 10px; right: 10px; background: #ffeb3b; padding: 5px 10px; font-weight: bold; border-radius: 5px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 80vh; padding: 10px; font-size: 16px; }
    </style>
</head>
<body>
    <div id="counter">選取字數：0</div>
    <p>請將文字貼在下方，選取時上方會即時顯示字數：</p>
    <textarea id="textInput" placeholder="在此輸入文字..."></textarea>

    <script>
        const input = document.getElementById('textInput');
        const counter = document.getElementById('counter');

        function updateCount() {
            const selectedText = input.value.substring(input.selectionStart, input.selectionEnd);
            counter.innerText = '選取字數：' + selectedText.length;
        }

        // 監聽滑鼠移動與按鍵，達到真正的「即時」
        input.addEventListener('mousemove', (e) => { if (e.buttons === 1) updateCount(); });
        input.addEventListener('mouseup', updateCount);
        input.addEventListener('keyup', updateCount);
    </script>
</body>
</html>
