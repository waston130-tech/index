<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>長文處理工具</title>
    <style>
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            padding: 20px; 
            background-color: #121212; 
            color: #e0e0e0; 
            line-height: 1.6;
        }
        #counter { 
            position: fixed; 
            top: 20px; 
            right: 20px; 
            background: #fbc02d; 
            color: #000;
            padding: 10px 15px; 
            font-weight: bold; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            z-index: 100;
        }
        .control-panel {
            margin-bottom: 20px;
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label { display: block; margin-bottom: 5px; color: #aaa; font-size: 14px; }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            background-color: #2c2c2c;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            font-size: 16px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 20px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
        }
        .copy-btn { background-color: #4caf50; color: white; }
        .reader-btn { background-color: #2196f3; color: white; }
        .evernote-btn { background-color: #00a82d; color: white; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        
        textarea { 
            width: 100%; 
            height: 60vh; 
            padding: 15px; 
            font-size: 18px; 
            background-color: #1e1e1e; 
            color: #ffffff; 
            border: 1px solid #333;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: inherit;
        }
    </style>
</head>
<body>
    <div id="counter">總字數：0</div>
    
    <h2>華生知識煉金術：長文轉化台</h2>
    
    <div class="control-panel">
        <div class="input-group">
            <label>郵件主旨 (Email Subject)</label>
            <input type="text" id="subjectInput" placeholder="例如：【原始長文】提摩太前書 4:12 @靈修筆記 #Raw">
        </div>
        
        <div class="btn-group">
            <button class="copy-btn" onclick="copyText()">📋 複製文字</button>
            <button class="reader-btn" onclick="sendToReader()">📧 寄給 Reader</button>
            <button class="evernote-btn" onclick="sendToEvernote()">📧 寄給 Evernote</button>
        </div>
    </div>

    <textarea id="textInput" placeholder="在此貼上 Gemini 轉化後的長文..."></textarea>

    <script>
        const input = document.getElementById('textInput');
        const counter = document.getElementById('counter');
        const subjectInput = document.getElementById('subjectInput');

        // 已為你寫死收件信箱
        const READER_EMAIL = "waston@library.readwise.io";
        const EVERNOTE_EMAIL = "waston130.454d0b8@m.evernote.com";

        function updateCount() {
            const selectedText = input.value.substring(input.selectionStart, input.selectionEnd);
            if (selectedText.length > 0) {
                counter.innerText = '選取字數：' + selectedText.length;
            } else {
                counter.innerText = '總字數：' + input.value.length;
            }
        }

        function copyText() {
            input.select();
            document.execCommand('copy');
            alert('文字已複製！');
        }

        function sendToReader() {
            const subject = subjectInput.value || "【原始長文】未命名";
            const body = encodeURIComponent(input.value);
            window.location.href = `mailto:${READER_EMAIL}?subject=${encodeURIComponent(subject)}&body=${body}`;
        }

        function sendToEvernote() {
            const subject = subjectInput.value || "【原始長文】未命名";
            const body = encodeURIComponent(input.value);
            window.location.href = `mailto:${EVERNOTE_EMAIL}?subject=${encodeURIComponent(subject)}&body=${body}`;
        }

        input.addEventListener('mouseup', updateCount);
        input.addEventListener('keyup', updateCount);
        input.addEventListener('input', updateCount);
    </script>
</body>
</html>
