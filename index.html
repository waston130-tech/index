<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>華生專屬：長文處理工具</title>
    <style>
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            padding: 20px; 
            background-color: #121212; 
            color: #e0e0e0; 
            line-height: 1.6;
        }
        #counter { 
            position: fixed; 
            top: 20px; 
            right: 20px; 
            background: #fbc02d; 
            color: #000;
            padding: 10px 15px; 
            font-weight: bold; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            z-index: 100;
        }
        .btn-group {
            margin-bottom: 15px;
        }
        button {
            padding: 10px 20px;
            margin-right: 10px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }
        .copy-btn { background-color: #4caf50; color: white; }
        .email-btn { background-color: #2196f3; color: white; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        
        textarea { 
            width: 100%; 
            height: 70vh; 
            padding: 15px; 
            font-size: 18px; 
            background-color: #1e1e1e; 
            color: #ffffff; 
            border: 1px solid #333;
            border-radius: 10px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div id="counter">選取字數：0</div>
    
    <h2>華生知識煉金術：長文轉化台</h2>
    
    <div class="btn-group">
        <button class="copy-btn" onclick="copyText()">📋 一鍵複製文字</button>
        <button class="email-btn" onclick="sendEmail()">📧 發送到 Reader / Evernote</button>
    </div>

    <textarea id="textInput" placeholder="在此貼上 Gemini 轉化後的長文..."></textarea>

    <script>
        const input = document.getElementById('textInput');
        const counter = document.getElementById('counter');

        // 設定你的預設收件地址 (請在此修改)
        const DEFAULT_RECIPIENT = "你的Reader或Evernote信箱@example.com";
        const DEFAULT_SUBJECT = "【原始長文】深度研讀筆記";

        function updateCount() {
            const selectedText = input.value.substring(input.selectionStart, input.selectionEnd);
            // 若沒選取則顯示總字數，有選取則顯示選取數
            if (selectedText.length > 0) {
                counter.innerText = '選取字數：' + selectedText.length;
            } else {
                counter.innerText = '總字數：' + input.value.length;
            }
        }

        function copyText() {
            input.select();
            document.execCommand('copy');
            alert('文字已成功複製到剪貼簿！');
        }

        function sendEmail() {
            const body = encodeURIComponent(input.value);
            const mailtoLink = `mailto:${DEFAULT_RECIPIENT}?subject=${encodeURIComponent(DEFAULT_SUBJECT)}&body=${body}`;
            window.location.href = mailtoLink;
        }

        input.addEventListener('mousemove', (e) => { if (e.buttons === 1) updateCount(); });
        input.addEventListener('mouseup', updateCount);
        input.addEventListener('keyup', updateCount);
    </script>
</body>
</html>
