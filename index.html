<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Watson 專屬：長文煉金術 v3.5</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; padding: 20px; background-color: #121212; color: #e0e0e0; line-height: 1.6; }
        /* 右上角計數器 */
        #counter { position: fixed; top: 20px; right: 20px; background: #fbc02d; color: #000; padding: 10px 15px; font-weight: bold; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 100; min-width: 120px; text-align: center; transition: 0.3s; }
        /* 控制面板 */
        .control-panel { margin-bottom: 20px; background-color: #1e1e1e; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        input[type="text"] { width: 100%; padding: 12px; background-color: #2c2c2c; border: 1px solid #444; color: white; border-radius: 5px; font-size: 16px; box-sizing: border-box; margin-top: 5px; }
        /* 按鈕群組 */
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 15px; }
        button { padding: 12px 24px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; font-size: 15px; display: flex; align-items: center; gap: 8px; }
        .copy-btn { background-color: #4caf50; color: white; }
        .gmail-btn { background-color: #ea4335; color: white; }
        .save-btn { background-color: #ff9800; color: white; }
        .clear-btn { background-color: #333; color: #f44336; border: 1px solid #f44336; margin-left: auto; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        /* 輸入區 */
        textarea { width: 100%; height: 60vh; padding: 15px; font-size: 18px; background-color: #1e1e1e; color: #ffffff; border: 1px solid #333; border-radius: 10px; box-sizing: border-box; font-family: inherit; margin-top: 10px; line-height: 1.8; }
        .status-msg { font-size: 12px; color: #666; margin-top: 8px; text-align: right; }
    </style>
</head>
<body>
    <div id="counter">總字數：0</div>
    
    <h2>Watson 知識煉金術 v3.5</h2>
    
    <div class="control-panel">
        <label style="color:#aaa; font-size:14px;">郵件主旨 (Email Subject)</label>
        <input type="text" id="subjectInput" placeholder="在此輸入主旨，例如：【逐字稿】講道標題 @靈修筆記 #Raw">
        
        <div class="btn-group">
            <button class="copy-btn" onclick="copyText(false)">📋 複製文字</button>
            <button class="gmail-btn" onclick="sendViaGmailAPI()">📧 副帳號 Gmail 寄出 (防亂碼)</button>
            <button class="save-btn" onclick="saveAsTxt()">💾 存成 TXT</button>
            <button class="clear-btn" onclick="clearAll()">🗑️ 清空內容</button>
        </div>
        <div id="status" class="status-msg">內容已安全儲存在瀏覽器緩存</div>
    </div>

    <textarea id="textInput" placeholder="在此貼上經由深度閱讀長文轉化器 Gem 處理後的內容..."></textarea>

    <script>
        const input = document.getElementById('textInput');
        const counter = document.getElementById('counter');
        const subjectInput = document.getElementById('subjectInput');
        const statusMsg = document.getElementById('status');
        
        // 核心帳號設定
        const READER_EMAIL = "waston@library.readwise.io";
        const EVERNOTE_EMAIL = "waston130.454d0b8@m.evernote.com";
        const MY_SENDER_EMAIL = "waston1140620@gmail.com"; 

        // 1. 初始化：載入緩存內容
        window.onload = () => {
            const savedText = localStorage.getItem('watson_backup_text');
            const savedSubject = localStorage.getItem('watson_backup_subject');
            if (savedText) input.value = savedText;
            if (savedSubject) subjectInput.value = savedSubject;
            updateCount();
        };

        // 2. 自動儲存機制
        function autoSave() {
            localStorage.setItem('watson_backup_text', input.value);
            localStorage.setItem('watson_backup_subject', subjectInput.value);
            statusMsg.innerText = "上次存檔： " + new Date().toLocaleTimeString();
        }

        // 3. 字數統計與選取邏輯
        function updateCount() {
            const totalLength = input.value.length;
            const selectedText = input.value.substring(input.selectionStart, input.selectionEnd);
            
            if (selectedText.length > 0) {
                counter.innerText = '選取字數：' + selectedText.length;
                counter.style.background = '#00e676'; // 選取時變綠色
            } else {
                counter.innerText = '總字數：' + totalLength;
                counter.style.background = '#fbc02d'; // 預設黃色
            }
            autoSave();
        }

        // 4. 複製功能
        function copyText(isSilent = false) {
            if (!input.value) { if(!isSilent) alert("沒有內容可以複製喔！"); return; }
            input.select();
            document.execCommand('copy');
            if(!isSilent) alert('文字已複製到剪貼簿！');
            window.getSelection().removeAllRanges(); // 取消選取藍底
        }

        // 5. 存成 TXT (支援 UTF-8 BOM，防止 Windows 亂碼)
        function saveAsTxt() {
            if(!input.value) { alert("內容是空的，無法存檔。"); return; }
            const blob = new Blob(["\ufeff" + input.value], { type: "text/plain;charset=utf-8" });
            const anchor = document.createElement("a");
            const fileName = (subjectInput.value || "Watson_Note") + ".txt";
            anchor.download = fileName;
            anchor.href = window.URL.createObjectURL(blob);
            anchor.click();
            window.URL.revokeObjectURL(anchor.href);
        }

        // 6. Gmail API 寄送 (分流與防亂碼)
        function sendViaGmailAPI() {
            if(!input.value) { alert("請先貼入要處理的長文內容。"); return; }
            
            // 背景自動複製全文
            copyText(true); 
            
            const to = encodeURIComponent(READER_EMAIL + "," + EVERNOTE_EMAIL);
            const subject = encodeURIComponent(subjectInput.value || "【煉金產出】未命名");
            
            // 強制切換至副帳號
            const gmailUrl = `https://mail.google.com/mail/?authuser=${MY_SENDER_EMAIL}&view=cm&fs=1&to=${to}&su=${subject}`;
            
            window.open(gmailUrl, '_blank');
            
            setTimeout(() => {
                alert("✅ 內容已自動複製！\n\n請在 Gmail 視窗點擊內文處，按下 Ctrl+V (或 Cmd+V) 貼上即可寄出。");
            }, 300);
        }

        // 7. 一鍵清空
        function clearAll() {
            if (input.value === "" && subjectInput.value === "") return;
            if (confirm("確定要清空目前的內容嗎？（緩存也會被清除）")) {
                input.value = "";
                subjectInput.value = "";
                localStorage.removeItem('watson_backup_text');
                localStorage.removeItem('watson_backup_subject');
                updateCount();
            }
        }

        // 監聽器
        input.addEventListener('input', updateCount);
        input.addEventListener('mouseup', updateCount);
        input.addEventListener('keyup', updateCount);
        subjectInput.addEventListener('input', autoSave);
    </script>
</body>
</html>
